version: '3.8'

services:
  postgres:
    image: postgres:13
    container_name: news_data_postgres
    environment:
      POSTGRES_DB: news_data_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - news_network

  # Optionnel: Airflow pour l'orchestration
  # airflow-webserver:
