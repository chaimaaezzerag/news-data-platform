  #     AIRFLOW__CORE__LOAD_EXAMPLES: 'False'
  #   ports:
  #     - "8080:8080"
  #   volumes:
  #     - ./orchestration/dags:/opt/airflow/dags
  #     - ./orchestration/logs:/opt/airflow/logs
  #     - ./orchestration/plugins:/opt/airflow/plugins
  #   depends_on:
  #     - postgres
  #   networks:
  #     - news_network
  #   command: webserver

volumes:
  postgres_data:

networks:
  news_network:
    driver: bridge